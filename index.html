<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UzairTechGuide - Think Digital, Live Real!</title>
  
  <style>
    /* CSS FIXES: Constraints and Centering */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center; /* Centers everything horizontally */
      width: 100%;
    }

    /* This wrapper limits width on desktop, but lets content flow on mobile */
    main, .hero, .nav-tiles, .section, .footer {
      width: 100%;
      max-width: 1000px; /* Limits maximum expansion */
      margin: 0 auto;
    }

    .logo {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    /* Grid layout improvements */
    .grid, .nav-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    @media (min-width: 768px) {
      .nav-tiles {
        grid-template-columns: repeat(4, 1fr); /* 4 columns on desktop */
      }
    }
  </style>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="top-controls">...</div>

  <main>
    <header id="home" class="hero">
      <div class="hero-inner">
        <img src="logo.webp" width="120" height="90" alt="Logo" class="logo" />
        <h1>UzairTechGuide</h1>
        <p>Practical Android tutorials...</p>
      </div>
    </header>

    <section class="nav-tiles">
      </section>

    <section id="features" class="section">
      <div class="grid">
        </div>
    </section>

    <footer class="footer">
      </footer>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
